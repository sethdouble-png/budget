name: Node.js CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm ci
      - name: Run syntax check
        run: npm run check
      - name: Run server static lint
        run: npm run check
