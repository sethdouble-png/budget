<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Seth and Paula Finances</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Seth & Paula Finances</h1>

    <section class="summary">
      <div>
        Currency: <select id="currencySelect">
          <option value="USD">USD ($)</option>
          <option value="AED">AED (د.إ)</option>
          <option value="UGX">UGX (USh)</option>
        </select>
      </div>
      <div id="income">Income: $0.00</div>
      <div id="expense">Expense: $0.00</div>
      <div id="savings">Savings: $0.00</div>
      <div>
        Budget: <span id="currencySymbol">$</span><input id="budgetInput" type="number" step="0.01" min="0"> <button id="saveBudget">Save</button>
      </div>
    </section>

    <section class="add">
      <h2>Add transaction</h2>
      <form id="txForm">
        <input id="date" type="date" required>
        <input id="amount" type="number" step="0.01" placeholder="amount" required>
        <select id="type">
          <option value="expense">Expense</option>
          <option value="income">Income</option>
        </select>
        <input id="category" placeholder="category">
        <input id="note" placeholder="note">
        <button type="submit">Add</button>
      </form>
    </section>

    <section class="list">
      <h2>Transactions</h2>
      <div class="export-buttons">
        <button id="exportAll">Export All</button>
        <button id="exportIncome">Export Income</button>
        <button id="exportExpenses">Export Expenses</button>
        <button id="exportSummary">Export Summary</button>
      </div>
      <table id="txTable">
        <thead><tr><th>Date</th><th>Amount</th><th>Type</th><th>Category</th><th>Note</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
